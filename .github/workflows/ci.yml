name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [identity-service, game-service, learning-service, player-service, gateway]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build and Test
        run: |
          cd Backend/${{ matrix.service }}
          chmod +x mvnw
          ./mvnw test
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-${{ matrix.service }}
          path: Backend/${{ matrix.service }}/target/site/jacoco/

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd Frontend
          npm install
      - name: Run tests
        run: |
          cd Frontend
          npm test

  docker-build-and-scan:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    strategy:
      matrix:
        service: [identity-service, game-service, learning-service, player-service, gateway]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t csd-${{ matrix.service }}:latest ./Backend/${{ matrix.service }}
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'csd-${{ matrix.service }}:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  frontend-security:
    name: Frontend Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: npm audit
        run: |
          cd Frontend
          npm audit --audit-level=high
