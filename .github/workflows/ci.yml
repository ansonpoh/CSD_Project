name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [identity-service, game-service, learning-service, player-service, gateway]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build and Test
        run: |
          cd Backend/${{ matrix.service }}
          chmod +x mvnw
          ./mvnw test
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-${{ matrix.service }}
          path: Backend/${{ matrix.service }}/target/site/jacoco/

  backend-aggregate:
    name: Backend Aggregate Verification
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run aggregate backend tests
        run: |
          cd Backend
          chmod +x mvnw
          ./mvnw test
      - name: Upload aggregate JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-aggregate
          path: Backend/coverage-report/target/site/jacoco-aggregate/

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd Frontend
          npm install
      - name: Run tests
        run: |
          cd Frontend
          npm test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd Frontend
          npm install
      - name: Build frontend
        env:
          VITE_API_BASE_URL: https://example-gateway.invalid
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: test-anon-key
        run: |
          cd Frontend
          npm run build
      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist/

  docker-build-and-scan:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: [backend-aggregate, frontend-build]
    strategy:
      matrix:
        service: [identity-service, game-service, learning-service, player-service, gateway]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t csd-${{ matrix.service }}:latest ./Backend/${{ matrix.service }}
      - name: Run Trivy library vulnerability scanner
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: 'image'
          scanners: 'vuln'
          image-ref: 'csd-${{ matrix.service }}:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'library'
          severity: 'CRITICAL,HIGH'
      - name: Run Trivy OS vulnerability scanner
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: 'image'
          scanners: 'vuln'
          image-ref: 'csd-${{ matrix.service }}:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os'
          severity: 'CRITICAL,HIGH'

  frontend-security:
    name: Frontend Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd Frontend
          npm install
      - name: npm audit
        run: |
          cd Frontend
          npm audit --audit-level=high
