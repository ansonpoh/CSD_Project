name: Deploy Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/ansonpoh/csd-project

jobs:
  publish-images:
    name: Publish Backend Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [identity-service, game-service, learning-service, player-service, gateway]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Promote current latest to stable
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}
        run: |
          if docker buildx imagetools inspect "${IMAGE_NAME}:latest" >/dev/null 2>&1; then
            docker buildx imagetools create -t "${IMAGE_NAME}:stable" "${IMAGE_NAME}:latest"
          else
            echo "No existing latest tag found for ${IMAGE_NAME}; skipping stable promotion."
          fi
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./Backend/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ github.sha }}

  trigger-render-deploys:
    name: Trigger Render Deploys
    runs-on: ubuntu-latest
    needs: publish-images
    steps:
      - name: Validate Render deploy hooks
        env:
          RENDER_DEPLOY_HOOK_IDENTITY_SERVICE: ${{ secrets.RENDER_DEPLOY_HOOK_IDENTITY_SERVICE }}
          RENDER_DEPLOY_HOOK_GAME_SERVICE: ${{ secrets.RENDER_DEPLOY_HOOK_GAME_SERVICE }}
          RENDER_DEPLOY_HOOK_LEARNING_SERVICE: ${{ secrets.RENDER_DEPLOY_HOOK_LEARNING_SERVICE }}
          RENDER_DEPLOY_HOOK_PLAYER_SERVICE: ${{ secrets.RENDER_DEPLOY_HOOK_PLAYER_SERVICE }}
          RENDER_DEPLOY_HOOK_GATEWAY: ${{ secrets.RENDER_DEPLOY_HOOK_GATEWAY }}
        run: |
          missing=0
          for hook in IDENTITY_SERVICE GAME_SERVICE LEARNING_SERVICE PLAYER_SERVICE GATEWAY; do
            var="RENDER_DEPLOY_HOOK_${hook}"
            if [ -z "${!var}" ]; then
              echo "::error::Missing GitHub secret ${var}. Add it in repository settings before merging to main."
              missing=1
            fi
          done

          exit "$missing"
      - name: Trigger identity-service deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_IDENTITY_SERVICE }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
      - name: Trigger game-service deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_GAME_SERVICE }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
      - name: Trigger learning-service deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_LEARNING_SERVICE }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
      - name: Trigger player-service deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_PLAYER_SERVICE }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
      - name: Trigger gateway deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_GATEWAY }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

  production-smoke-test:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    needs: trigger-render-deploys
    steps:
      - uses: actions/checkout@v4
      - name: Wait for Render rollout
        run: sleep 90
      - name: Verify live gateway
        env:
          GATEWAY_URL: ${{ secrets.PROD_GATEWAY_URL }}
          FRONTEND_ORIGIN: ${{ secrets.PROD_FRONTEND_URL }}
        run: |
          chmod +x scripts/smoke-test-production.sh
          ./scripts/smoke-test-production.sh
      - name: Publish deployment summary
        run: |
          {
            echo "## Production Deployment"
            echo ""
            echo "- Gateway: ${{ secrets.PROD_GATEWAY_URL }}"
            echo "- Frontend: ${{ secrets.PROD_FRONTEND_URL }}"
            echo "- Image tag: \`${{ github.sha }}\`"
            echo "- Registry namespace: \`${{ env.IMAGE_NAMESPACE }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
