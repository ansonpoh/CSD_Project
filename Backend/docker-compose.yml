services:
  redis:
    image: redis:7-alpine
    container_name: csd-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./csd
      dockerfile: Dockerfile
    container_name: csd-backend
    # Port 8090 is internal only — only the gateway talks to the monolith directly
    ports:
      - "8090:8080"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SUPABASE_SERVER_PASSWORD: ${SUPABASE_SERVER_PASSWORD}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}

  identity-service:
    build:
      context: ./identity-service
      dockerfile: Dockerfile
    container_name: csd-identity
    # Port 8091 is internal only, mapped from 8081 for testing or debugging if needed
    ports:
      - "8091:8081"
    environment:
      SUPABASE_SERVER_PASSWORD: ${SUPABASE_SERVER_PASSWORD}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}

  game-service:
    build:
      context: ./game-service
      dockerfile: Dockerfile
    container_name: csd-game
    ports:
      - "8092:8082"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
      identity-service:
        condition: service_started
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SUPABASE_SERVER_PASSWORD: ${SUPABASE_SERVER_PASSWORD}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      LEARNING_URL: http://learning-service:8083

  learning-service:
    build:
      context: ./learning-service
      dockerfile: Dockerfile
    container_name: csd-learning
    ports:
      - "8093:8083"
    depends_on:
      backend:
        condition: service_started
      game-service:
        condition: service_started
    environment:
      SUPABASE_SERVER_PASSWORD: ${SUPABASE_SERVER_PASSWORD}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GAME_URL: http://game-service:8082
      BACKEND_URL: http://csd-backend:8080
      PLAYER_URL: http://player-service:8084

  player-service:
    build:
      context: ./player-service
      dockerfile: Dockerfile
    container_name: csd-player
    ports:
      - "8094:8084"
    depends_on:
      backend:
        condition: service_started
      identity-service:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      SUPABASE_SERVER_PASSWORD: ${SUPABASE_SERVER_PASSWORD}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: csd-gateway
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_started
      identity-service:
        condition: service_started
      game-service:
        condition: service_started
      learning-service:
        condition: service_started
      player-service:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      # Points to the monolith's internal port (8090 on host = 8080 in container)
      BACKEND_URL: http://csd-backend:8080
      IDENTITY_URL: http://identity-service:8081
      GAME_URL: http://game-service:8082
      LEARNING_SERVICE_URL: http://learning-service:8083
      PLAYER_SERVICE_URL: http://player-service:8084