services:
  redis:
    image: redis:7-alpine
    container_name: csd-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  zipkin:
    image: openzipkin/zipkin
    container_name: csd-zipkin
    ports:
      - "9411:9411"

  identity-service:
    build:
      context: ./identity-service
      dockerfile: Dockerfile
    container_name: csd-identity
    # Port 8091 is internal only, mapped from 8081 for testing or debugging if needed
    ports:
      - "8091:8081"
    environment:
      SUPABASE_SERVER_PASSWORD: ${SUPABASE_SERVER_PASSWORD}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      DB_POOL_MAX_SIZE: 2
      DB_POOL_MIN_IDLE: 0
      DB_DDL_AUTO: update
      ZIPKIN_URL: http://zipkin:9411
      GAME_URL: http://game-service:8082
      LEARNING_SERVICE_URL: http://learning-service:8083
      PLAYER_SERVICE_URL: http://player-service:8084
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"
    depends_on:
      - zipkin
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  game-service:
    build:
      context: ./game-service
      dockerfile: Dockerfile
    container_name: csd-game
    ports:
      - "8092:8082"
    depends_on:
      redis:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      zipkin:
        condition: service_started
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SUPABASE_SERVER_PASSWORD: ${SUPABASE_SERVER_PASSWORD}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      DB_POOL_MAX_SIZE: 2
      DB_POOL_MIN_IDLE: 0
      DB_DDL_AUTO: update
      ZIPKIN_URL: http://zipkin:9411
      LEARNING_URL: http://learning-service:8083
      IDENTITY_URL: http://identity-service:8081
      PLAYER_SERVICE_URL: http://player-service:8084
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 150s

  learning-service:
    build:
      context: ./learning-service
      dockerfile: Dockerfile
    container_name: csd-learning
    ports:
      - "8093:8083"
    depends_on:
      game-service:
        condition: service_healthy
      zipkin:
        condition: service_started
    environment:
      SUPABASE_SERVER_PASSWORD: ${SUPABASE_SERVER_PASSWORD}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DB_POOL_MAX_SIZE: 2
      DB_POOL_MIN_IDLE: 0
      DB_DDL_AUTO: update
      ZIPKIN_URL: http://zipkin:9411
      IDENTITY_URL: http://identity-service:8081
      GAME_URL: http://game-service:8082
      PLAYER_SERVICE_URL: http://player-service:8084
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8083/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s

  player-service:
    build:
      context: ./player-service
      dockerfile: Dockerfile
    container_name: csd-player
    ports:
      - "8094:8084"
    depends_on:
      identity-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      zipkin:
        condition: service_started
    environment:
      SUPABASE_SERVER_PASSWORD: ${SUPABASE_SERVER_PASSWORD}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      DB_POOL_MAX_SIZE: 2
      DB_POOL_MIN_IDLE: 0
      DB_DDL_AUTO: update
      ZIPKIN_URL: http://zipkin:9411
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"
      IDENTITY_URL: http://identity-service:8081
      GAME_URL: http://game-service:8082
      LEARNING_SERVICE_URL: http://learning-service:8083
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8084/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: csd-gateway
    ports:
      - "8080:8080"
    depends_on:
      identity-service:
        condition: service_healthy
      game-service:
        condition: service_healthy
      learning-service:
        condition: service_healthy
      player-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      zipkin:
        condition: service_started
    environment:
      IDENTITY_URL: http://identity-service:8081
      GAME_URL: http://game-service:8082
      LEARNING_SERVICE_URL: http://learning-service:8083
      PLAYER_SERVICE_URL: http://player-service:8084
      ZIPKIN_URL: http://zipkin:9411
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
