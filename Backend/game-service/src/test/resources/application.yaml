spring:
  datasource:
    url: jdbc:h2:mem:gamedb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        hbm2ddl:
          create_namespaces: true
  sql:
    init:
      mode: never
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost/game-test

supabase:
  jwt:
    secret: test
  url: http://localhost
  service:
    key: test

management:
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: false
