server:
  port: 8080

spring:
  application:
    name: gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      # Global CORS configuration — handles preflight OPTIONS requests for all routes
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      # Default filters applied to all routes
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      routes:
        # ─────────────────────────────────────────────
        # PHASE 2: Identity Service
        # ─────────────────────────────────────────────
        - id: identity-service
          uri: ${IDENTITY_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**, /api/administrators/**, /api/contributors/**

        # ─────────────────────────────────────────────
        # PHASE 3: Game World Service
        # ─────────────────────────────────────────────
        - id: game-service
          uri: ${GAME_URL:http://localhost:8082}
          predicates:
            - Path=/api/maps/**, /api/npcs/**, /api/monsters/**, /api/animations/**, /api/encounters/**
          filters:
            - name: CircuitBreaker
              args:
                name: gameServiceCircuitBreaker
                fallbackUri: forward:/fallback/game

        # ─────────────────────────────────────────────
        # PHASE 1 (Epic 1): All other traffic → monolith
        # ─────────────────────────────────────────────
        - id: learning-service
          uri: ${LEARNING_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/quizzes/**, /api/ai/**, /api/contents/**, /api/question-bank/**, /api/map-quizzes/**, /api/topic/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@userKeyResolver}"

        # ─────────────────────────────────────────────
        # PHASE 5: Player & Economy Service
        # ─────────────────────────────────────────────
        - id: player-service
          uri: ${PLAYER_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/economy/**, /api/learner/**, /api/leaderboard/**, /api/inventory/**, /api/purchases/**

# Actuator — expose health endpoint publicly
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans

resilience4j:
  timelimiter:
    instances:
      gameServiceCircuitBreaker:
        timeoutDuration: 60s
        cancelRunningFuture: true
  circuitbreaker:
    instances:
      gameServiceCircuitBreaker:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
