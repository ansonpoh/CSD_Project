server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      # Global CORS configuration — handles preflight OPTIONS requests for all routes
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      # Default filters applied to all routes
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      routes:
        # ─────────────────────────────────────────────
        # PHASE 2: Identity Service
        # ─────────────────────────────────────────────
        - id: identity-service
          uri: ${IDENTITY_URL:http://identity-service:8081}
          predicates:
            - Path=/api/auth/**, /api/administrators/**, /api/contributors/**

        # ─────────────────────────────────────────────
        # PHASE 3: Game World Service
        # ─────────────────────────────────────────────
        - id: game-service
          uri: ${GAME_URL:http://game-service:8082}
          predicates:
            - Path=/api/maps/**, /api/npcs/**, /api/monsters/**, /api/animations/**, /api/encounters/**

        # ─────────────────────────────────────────────
        # PHASE 1 (Epic 1): All other traffic → monolith
        # ─────────────────────────────────────────────
        - id: learning-service
          uri: ${LEARNING_SERVICE_URL:http://learning-service:8083}
          predicates:
            - Path=/api/quizzes/**, /api/ai/**, /api/contents/**, /api/question-bank/**, /api/map-quizzes/**, /api/topic/**

        - id: monolith-fallback
          uri: ${BACKEND_URL:http://csd-backend:8090}
          predicates:
            - Path=/api/**

        # Swagger UI passthrough to monolith
        - id: swagger-ui
          uri: ${BACKEND_URL:http://csd-backend:8090}
          predicates:
            - Path=/swagger-ui/**, /v3/api-docs/**, /swagger-ui.html, /webjars/**

# Actuator — expose health endpoint publicly
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
