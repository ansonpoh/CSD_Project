server:
  port: 8081

spring:
  application:
    name: identity-service

  datasource:
    url: jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/postgres?sslmode=require
    username: postgres.tdhhdbipbnlfdjlbxege
    password: ${SUPABASE_SERVER_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      connection-init-sql: SET search_path TO public
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:0}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:30000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:300000}
      keepalive-time: ${DB_POOL_KEEPALIVE_MS:0}
      initialization-fail-timeout: 60000

  sql:
    init:
      mode: always

  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    
    hibernate:
      ddl-auto: ${DB_DDL_AUTO:none}

    properties:
      '[format_sql]': true
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        '[default_schema]': public

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://tdhhdbipbnlfdjlbxege.supabase.co/auth/v1

supabase:
  jwt:
    secret: ${SUPABASE_JWT_SECRET}
  url: ${SUPABASE_URL}
  service:
    key: ${SUPABASE_SERVICE_KEY}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
