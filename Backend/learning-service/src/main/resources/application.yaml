server:
  port: 8083

spring:
  application:
    name: learning-service

  datasource:
    url: jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/postgres?sslmode=require
    username: postgres.tdhhdbipbnlfdjlbxege
    password: ${SUPABASE_SERVER_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      connection-init-sql: SET search_path TO public
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:0}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:30000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:300000}
      keepalive-time: ${DB_POOL_KEEPALIVE_MS:0}
      initialization-fail-timeout: 60000

  jpa:
    show-sql: ${JPA_SHOW_SQL:false}
    database-platform: org.hibernate.dialect.PostgreSQLDialect

    hibernate:
      ddl-auto: ${DB_DDL_AUTO:none}

    properties:
      '[format_sql]': true
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        '[default_schema]': public

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        initialize-schema: false
        dimensions: 1536
        distance-type: cosine_distance
        index-type: hnsw
        schema-name: contents
        table-name: content_vectors

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://tdhhdbipbnlfdjlbxege.supabase.co/auth/v1

supabase:
  jwt:
    secret: ${SUPABASE_JWT_SECRET}
  url: ${SUPABASE_URL}
  service:
    key: ${SUPABASE_SERVICE_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans

identity:
  url: ${IDENTITY_URL:http://localhost:8081}

chatbot:
  url: ${CHATBOT_URL:http://localhost:8080}
  warmup:
    enabled: ${CHATBOT_WARMUP_ENABLED:true}
    query: ${CHATBOT_WARMUP_QUERY:Warm up chatbot runtime.}
    max-chunks: ${CHATBOT_WARMUP_MAX_CHUNKS:1}
    initial-delay-ms: ${CHATBOT_WARMUP_INITIAL_DELAY_MS:2000}
    retry-count: ${CHATBOT_WARMUP_RETRY_COUNT:4}
    retry-delay-ms: ${CHATBOT_WARMUP_RETRY_DELAY_MS:3000}

http:
  client:
    connect-timeout-ms: ${HTTP_CLIENT_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${HTTP_CLIENT_READ_TIMEOUT_MS:30000}
